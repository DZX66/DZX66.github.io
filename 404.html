<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>404 · 页面未找到 - 柳下回声</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components/header.css">
  <link rel="stylesheet" href="css/components/card.css">
  <link rel="stylesheet" href="css/layouts/grid.css">
</head>
<body>
  <div class="app-wrapper">
    <header class="site-header">
      <div class="brand">
        <div class="brand-icon" aria-hidden="true"><img src="icon.png" alt="柳下回声" style="width: 220px; height: 58px;"></div>
        <!-- <h1 class="site-title">柳下回声</h1> -->
        <span class="site-sub">Echo Under Willow</span>
      </div>
      <div class="header-meta">
        <span class="badge"></span>
      </div>
    </header>

    <main class="home-grid">
      <section class="card full-width" style="text-align: center; padding: 3rem 2rem;">
        <div class="card-body">
          <div style="font-size: 6rem; margin-bottom: 1rem; opacity: 0.3;">404</div>
          <h2 style="font-size: 1.8rem; color: var(--accent-deep); margin-bottom: 1rem;">🍂 页面未找到</h2>
          <p style="color: var(--text-secondary); margin-bottom: 2rem; max-width: 500px; margin-left: auto; margin-right: auto;">
            抱歉，您寻找的页面不存在。
          </p>
          <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
            <a href="/" class="primary-button">🏠 返回主页</a>
            <a href="/pages" class="primary-button" style="background: var(--text-secondary);">📖 浏览所有页面</a>
          </div>
        </div>
      </section>

      <section class="card full-width">
        <div class="card-header">
          <h2>💡 建议</h2>
        </div>
        <div class="card-body">
          <ul style="list-style: none; padding: 0;">
            <li style="padding: 0.8rem 0; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; gap: 10px;">
              <span style="font-size: 1.2rem;">🔍</span>
              <span>检查网址是否正确输入</span>
            </li>
            <li style="padding: 0.8rem 0; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; gap: 10px;">
              <span style="font-size: 1.2rem;">📂</span>
              <span>访问 <a href="/pages" style="color: var(--accent-deep);">页面索引</a> 查找内容</span>
            </li>
            <li style="padding: 0.8rem 0; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; gap: 10px;">
              <span style="font-size: 1.2rem;">🏠</span>
              <span>返回 <a href="/" style="color: var(--accent-deep);">主页</a> 重新开始</span>
            </li>
            <li style="padding: 0.8rem 0; display: flex; align-items: center; gap: 10px;">
              <span style="font-size: 1.2rem;">📜</span>
              <span>前往 <a href="https://github.com/DZX66/DZX66.github.io/commits/main/" style="color: var(--accent-deep);" target="_blank">提交记录</a> 查询页面是否被删除并获取历史版本</span>
            </li>
            <li style="padding: 0.8rem 0; display: flex; align-items: center; gap: 10px;">
              <span style="font-size: 1.2rem;">🔗</span>
              <span>如果您是通过一个链接来到这里的，请提醒编辑者检查链接的有效性</span>
            </li>
          </ul>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p><span id="currentYear"></span>  ·  ✎ 柳下回声</p>
    </footer>
  </div>

  <script>
    document.getElementById('currentYear').textContent = new Date().getFullYear();
  </script>
</body>
</html>
